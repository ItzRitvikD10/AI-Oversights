---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <span class="reading-time">
  {% assign words = content | strip_html | number_of_words %}
  {{ words | divided_by: 180 | at_least: 1 }} min read
  </span>
  
  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
