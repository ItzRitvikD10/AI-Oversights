---
layout: default
---

<div class="post-page">
  <div class="post-header">
    <span class="card-tag">Essay</span>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {% assign words = content | strip_html | number_of_words %}
      {{ words | divided_by: 180 | at_least: 1 }} min read
      &middot;
      {{ page.date | date: "%B %e, %Y" }}
    </p>
  </div>
  <div class="post-body">
    {{ content }}
  </div>
  <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--rule);">
    {% include disqus.html %}
  </div>
</div>
